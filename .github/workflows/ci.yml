name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core:
    name: core (rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test
        working-directory: crates/ms-manager-core

  frontend:
    name: frontend (svelte)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: |
          npm ci --include=optional
          npm install --include=optional

      - name: Ensure Rollup native binary
        shell: bash
        run: |
          set -euo pipefail
          # npm sometimes skips Rollup's Linux optional package on GitHub runners.
          package_spec="$(node -e "const pkg=require('./node_modules/rollup/package.json'); const name=Object.keys(pkg.optionalDependencies || {}).find((dep) => dep.includes('linux-x64-gnu')); if (!name) { throw new Error('missing linux rollup optional dependency metadata'); } process.stdout.write(name + '@' + pkg.optionalDependencies[name]);")"
          npm install --no-save "$package_spec"

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

  tauri_check:
    name: tauri (cargo check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            pkg-config \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
