name: Candidate

run-name: Candidate ${{ github.event_name == 'push' && github.sha || inputs.source_sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Source commit SHA to package"
        required: true
        type: string
      tooling_sha:
        description: "ms-dev-env tooling commit SHA used for candidate metadata"
        required: true
        type: string
      request_id:
        description: "Optional dispatch correlation id"
        required: false
        default: ""
        type: string

concurrency:
  group: candidate-${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || inputs.source_sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GIT_CONFIG_COUNT: 2
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  GIT_CONFIG_KEY_1: advice.detachedHead
  GIT_CONFIG_VALUE_1: "false"

jobs:
  resolve_inputs:
    name: resolve candidate inputs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      tooling_sha: ${{ steps.resolve.outputs.tooling_sha }}
      candidate_tag: ${{ steps.resolve.outputs.candidate_tag }}
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.sha || inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve source SHA and tooling SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            source_sha="${{ github.sha }}"
            tooling_sha="$(python -c 'import json; from pathlib import Path; print(json.loads(Path(".github/release-tooling.json").read_text(encoding="utf-8"))["sha"])')"
          else
            source_sha="${{ inputs.source_sha }}"
            tooling_sha="${{ inputs.tooling_sha }}"
          fi
          if ! [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "invalid source SHA: $source_sha" >&2
            exit 1
          fi
          if ! [[ "$tooling_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "invalid tooling SHA: $tooling_sha" >&2
            exit 1
          fi
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          if ! git merge-base --is-ancestor "$source_sha" origin/main; then
            echo "source SHA is not reachable from main: $source_sha" >&2
            exit 1
          fi
          tooling_repo="$(mktemp -d)"
          git -C "$tooling_repo" init -q
          git -C "$tooling_repo" remote add origin https://github.com/petitechose-midi-studio/ms-dev-env.git
          git -C "$tooling_repo" fetch --no-tags --filter=blob:none origin "+refs/heads/main:refs/remotes/origin/main"
          if ! git -C "$tooling_repo" merge-base --is-ancestor "$tooling_sha" refs/remotes/origin/main; then
            echo "tooling SHA is not reachable from ms-dev-env main: $tooling_sha" >&2
            exit 1
          fi
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "tooling_sha=$tooling_sha" >> "$GITHUB_OUTPUT"
          echo "candidate_tag=rc-${source_sha}-tooling-${tooling_sha}" >> "$GITHUB_OUTPUT"

      - name: Ensure candidate release does not already exist
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.resolve.outputs.candidate_tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "candidate release already exists: $tag" >&2
            exit 1
          fi

  dispatch_marker:
    name: register dispatch
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.request_id != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Write dispatch marker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dispatch
          cat > dispatch/marker.json <<'EOF'
          {"request_id":"${{ inputs.request_id }}"}
          EOF

      - name: Upload dispatch marker
        uses: actions/upload-artifact@v7
        with:
          name: dispatch-${{ inputs.request_id }}
          path: dispatch/marker.json
          retention-days: 1

  build:
    name: candidate (${{ matrix.platform }})
    needs: resolve_inputs
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles msi"
            artifact_name: ms-manager-windows-x86_64
          - platform: ubuntu-latest
            args: "--bundles deb,rpm"
            artifact_name: ms-manager-linux-x86_64
          - platform: macos-15-intel
            args: "--target x86_64-apple-darwin --bundles dmg"
            artifact_name: ms-manager-macos-x86_64
            macos_arch: x86_64
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
            artifact_name: ms-manager-macos-arm64
            macos_arch: arm64

    steps:
      - name: Checkout source SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_inputs.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate source SHA
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          if [ "$sha" != "${{ needs.resolve_inputs.outputs.source_sha }}" ]; then
            echo "Checked out SHA does not match input" >&2
            echo "input=${{ needs.resolve_inputs.outputs.source_sha }}" >&2
            echo "head=$sha" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate app versions
        run: node scripts/ci/validate_app_versions.mjs

      - name: Validate frontend lockfile
        run: node scripts/ci/validate_frontend_lockfile.mjs

      - name: Test tauri versioning
        run: npm run test:tauri-versioning

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            pkg-config \
            patchelf \
            rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install deps
        run: npm ci --include=optional --no-audit --no-fund

      - name: Build candidate packages
        run: npm run tauri -- build ${{ matrix.args }}

      - name: Collect candidate packages
        shell: bash
        env:
          MACOS_ARCH: ${{ matrix.macos_arch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [ -n "$MACOS_ARCH" ] && [[ "$name" == *.dmg ]] && [[ "$name" != *x86_64* && "$name" != *x64* && "$name" != *amd64* && "$name" != *intel* && "$name" != *aarch64* && "$name" != *arm64* ]]; then
              name="${name%.dmg}-${MACOS_ARCH}.dmg"
            fi
            cp "$file" "dist/$name"
          done < <(find src-tauri/target -type f \( -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' \) -print0)
          if [ -z "$(find dist -type f -print -quit)" ]; then
            echo "no candidate packages were produced" >&2
            exit 1
          fi
          ls -la dist

      - name: Upload candidate packages
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  metadata:
    name: candidate metadata
    needs:
      - resolve_inputs
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout source SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_inputs.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: ${{ needs.resolve_inputs.outputs.tooling_sha }}
          path: workspace
          persist-credentials: false

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Download candidate packages
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: ms-manager-*
          merge-multiple: true

      - name: Generate candidate metadata inputs
        shell: bash
        run: |
          set -euo pipefail
          tmp_artifacts_json="$(mktemp)"
          node scripts/ci/generate_candidate_artifacts_json.mjs artifacts > "$tmp_artifacts_json"
          mv "$tmp_artifacts_json" artifacts/candidate-artifacts.json
          cat > artifacts/input-repos.json <<'EOF'
          [
            {
              "id": "ms-manager",
              "repo": "petitechose-midi-studio/ms-manager",
              "sha": "${{ needs.resolve_inputs.outputs.source_sha }}"
            },
            {
              "id": "ms-dev-env",
              "repo": "petitechose-midi-studio/ms-dev-env",
              "sha": "${{ needs.resolve_inputs.outputs.tooling_sha }}"
            }
          ]
          EOF
          cat > artifacts/toolchain.json <<'EOF'
          {
            "node": "20",
            "rust": "stable"
          }
          EOF

      - name: Write candidate manifest, checksums, and signature
        shell: bash
        working-directory: workspace
        env:
          MS_CANDIDATE_ED25519_SK: ${{ secrets.MS_CANDIDATE_ED25519_SK }}
        run: |
          set -euo pipefail
          uv run ms release candidate write \
            --artifacts-dir ../artifacts \
            --artifacts-json ../artifacts/candidate-artifacts.json \
            --input-repos-json ../artifacts/input-repos.json \
            --producer-repo petitechose-midi-studio/ms-manager \
            --producer-kind ms-manager-app \
            --workflow-file .github/workflows/candidate.yml \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --manifest-path ../artifacts/candidate.json \
            --checksums-path ../artifacts/checksums.txt \
            --sig-path ../artifacts/candidate.json.sig \
            --recipe-base-dir .. \
            --recipe-path .github/workflows/candidate.yml \
            --recipe-path package.json \
            --recipe-path package-lock.json \
            --recipe-path scripts/tauri.mjs \
            --recipe-path scripts/tauri_versioning.mjs \
            --recipe-path src-tauri/Cargo.toml \
            --recipe-path src-tauri/Cargo.lock \
            --recipe-path src-tauri/tauri.conf.json \
            --toolchain-json ../artifacts/toolchain.json

      - name: Create signed candidate release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve_inputs.outputs.candidate_tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "candidate release already exists: $tag" >&2
            exit 1
          fi
          gh release create \
            "$tag" \
            artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "candidate $tag" \
            --notes "Candidate artifacts for ${{ needs.resolve_inputs.outputs.source_sha }}" \
            --draft \
            --prerelease

      - name: Publish signed candidate release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve_inputs.outputs.candidate_tag }}"
          gh release edit \
            "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --prerelease
