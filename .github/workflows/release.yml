name: Release

run-name: Release ${{ inputs.tag }} / tooling ${{ inputs.tooling_sha }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true
        type: string
      source_sha:
        description: "Source commit SHA used to build the candidate"
        required: true
        type: string
      tooling_sha:
        description: "ms-dev-env tooling commit SHA used for candidate metadata"
        required: true
        type: string
      notes_b64:
        description: "Optional base64-encoded markdown prepended above auto-notes"
        required: false
        default: ""
        type: string
      notes_source:
        description: "Optional source path for external release notes"
        required: false
        default: ""
        type: string
      request_id:
        description: "Optional dispatch correlation id"
        required: false
        default: ""
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dispatch_marker:
    name: register dispatch
    if: ${{ inputs.request_id != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Write dispatch marker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dispatch
          cat > dispatch/marker.json <<'EOF'
          {"request_id":"${{ inputs.request_id }}"}
          EOF

      - name: Upload dispatch marker
        uses: actions/upload-artifact@v7
        with:
          name: dispatch-${{ inputs.request_id }}
          path: dispatch/marker.json
          retention-days: 1

  promote:
    name: promote release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: app-release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ inputs.tag }}"
          source_sha="${{ inputs.source_sha }}"
          tooling_sha="${{ inputs.tooling_sha }}"

          if ! [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid source_sha: $source_sha" >&2
            exit 1
          fi
          if ! [[ "$tooling_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid tooling_sha: $tooling_sha" >&2
            exit 1
          fi
          validate_sha() {
            local repo="$1"
            local sha="$2"
            local repo_dir
            repo_dir="$(mktemp -d)"
            git -C "$repo_dir" init -q
            git -C "$repo_dir" remote add origin "https://github.com/${repo}.git"
            git -C "$repo_dir" fetch --no-tags --filter=blob:none origin "+refs/heads/main:refs/remotes/origin/main"
            if ! git -C "$repo_dir" merge-base --is-ancestor "$sha" refs/remotes/origin/main; then
              echo "$repo SHA is not reachable from main: $sha" >&2
              exit 1
            fi
          }
          validate_sha petitechose-midi-studio/ms-manager "$source_sha"
          validate_sha petitechose-midi-studio/ms-dev-env "$tooling_sha"

          candidate_tag="rc-${source_sha}-tooling-${tooling_sha}"
          prerelease="false"
          if [[ "$release_tag" == *-* ]]; then
            prerelease="true"
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "tooling_sha=$tooling_sha" >> "$GITHUB_OUTPUT"
          echo "candidate_tag=$candidate_tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Wait for candidate release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.candidate_tag }}"
          echo "Waiting for candidate release: ${tag}"
          for _ in $(seq 1 180); do
            if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              echo "Candidate found"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for candidate release ${tag}" >&2
          exit 1

      - name: Download candidate assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "${{ steps.vars.outputs.candidate_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir artifacts
          ls -la artifacts

      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: petitechose-midi-studio/ms-dev-env
          ref: ${{ steps.vars.outputs.tooling_sha }}
          path: workspace
          persist-credentials: false

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Build expected candidate inputs
        shell: bash
        run: |
          set -euo pipefail
          cat > artifacts/input-repos.json <<'EOF'
          [
            {
              "id": "ms-manager",
              "repo": "petitechose-midi-studio/ms-manager",
              "sha": "${{ inputs.source_sha }}"
            },
            {
              "id": "ms-dev-env",
              "repo": "petitechose-midi-studio/ms-dev-env",
              "sha": "${{ inputs.tooling_sha }}"
            }
          ]
          EOF

      - name: Verify signed candidate metadata
        shell: bash
        working-directory: workspace
        env:
          MS_CANDIDATE_ED25519_PK: ${{ vars.MS_CANDIDATE_ED25519_PK }}
        run: |
          set -euo pipefail
          uv run ms release candidate verify \
            --artifacts-dir ../artifacts \
            --manifest-path ../artifacts/candidate.json \
            --checksums-path ../artifacts/checksums.txt \
            --sig-path ../artifacts/candidate.json.sig \
            --expected-producer-repo petitechose-midi-studio/ms-manager \
            --expected-producer-kind ms-manager-app \
            --expected-workflow-file .github/workflows/candidate.yml \
            --expected-input-repos-json ../artifacts/input-repos.json

      - name: Validate package policy
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          names = [p.name for p in Path("artifacts").iterdir() if p.is_file()]

          has_msi = any(n.endswith(".msi") for n in names)
          has_dmg = any(n.endswith(".dmg") for n in names)
          has_deb = any(n.endswith(".deb") for n in names)
          has_rpm = any(n.endswith(".rpm") for n in names)

          forbidden = [n for n in names if n.endswith(".AppImage") or n.endswith("-setup.exe")]

          missing = []
          if not has_msi:
              missing.append(".msi")
          if not has_dmg:
              missing.append(".dmg")
          if not has_deb:
              missing.append(".deb")
          if not has_rpm:
              missing.append(".rpm")

          if missing:
              raise SystemExit(f"missing expected package types: {', '.join(missing)}")
          if forbidden:
              raise SystemExit(f"forbidden artifacts present: {forbidden}")
          PY

      - name: Resolve external release notes
        id: external_notes
        shell: bash
        env:
          INPUT_NOTES_B64: ${{ inputs.notes_b64 }}
          INPUT_NOTES_SOURCE: ${{ inputs.notes_source }}
        run: |
          set -euo pipefail
          mkdir -p release-notes

          if [ -z "$INPUT_NOTES_B64" ]; then
            echo "has_external=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ["INPUT_NOTES_B64"]
          try:
              decoded = base64.b64decode(raw, validate=True).decode("utf-8")
          except Exception as exc:  # pragma: no cover - workflow validation
              raise SystemExit(f"invalid notes_b64 input: {exc}") from exc

          Path("release-notes/external.md").write_text(decoded, encoding="utf-8")
          PY

          echo "has_external=true" >> "$GITHUB_OUTPUT"
          echo "notes_file=release-notes/external.md" >> "$GITHUB_OUTPUT"

          if [ -n "$INPUT_NOTES_SOURCE" ]; then
            echo "External notes source: $INPUT_NOTES_SOURCE"
          fi

      - name: Build combined release notes
        id: notes
        if: ${{ steps.external_notes.outputs.has_external == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${{ steps.vars.outputs.release_tag }}" \
            -f target_commitish="${{ steps.vars.outputs.source_sha }}" \
            --jq '.body' > release-notes/generated.md

          python - <<'PY'
          from pathlib import Path

          external = Path("release-notes/external.md").read_text(encoding="utf-8").strip()
          generated = Path("release-notes/generated.md").read_text(encoding="utf-8").strip()
          parts = [part for part in (external, generated) if part]
          Path("release-notes/combined.md").write_text("\n\n".join(parts) + "\n", encoding="utf-8")
          PY

          echo "notes_file=release-notes/combined.md" >> "$GITHUB_OUTPUT"

      - name: Publish final release from candidate assets
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ steps.vars.outputs.release_tag }}"
          notes_file="${{ steps.notes.outputs.notes_file }}"

          if gh release view "$release_tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release already exists: $release_tag" >&2
            exit 1
          fi

          args=(
            gh release create "$release_tag" artifacts/* --repo "${GITHUB_REPOSITORY}"
            --title "ms-manager $release_tag"
            --target "${{ steps.vars.outputs.source_sha }}"
          )
          if [ "${{ steps.vars.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          if [ -n "$notes_file" ]; then
            args+=(--notes-file "$notes_file")
          else
            args+=(--generate-notes)
          fi
          "${args[@]}"

      - name: Show release URL
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${{ steps.vars.outputs.release_tag }}" --repo "${GITHUB_REPOSITORY}" --json url --jq '.url'
